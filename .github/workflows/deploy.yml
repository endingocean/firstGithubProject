name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/main/vue/package-lock.json
          
      - name: Install dependencies
        working-directory: src/main/vue
        run: npm ci
        
      - name: Build
        working-directory: src/main/vue
        env:
          # 设置为您的仓库名，例如 /repo-name/
          GITHUB_PAGES_BASE: ${{ format('/{0}/', github.event.repository.name) }}
          # 设置为您的后端地址，例如 https://your-backend.railway.app
          API_BASE: ${{ secrets.API_BASE || '' }}
        run: |
          # 如果没有设置 API_BASE，使用相对路径
          if [ -z "$API_BASE" ]; then
            npm run build
          else
            npm run build -- --mode github-pages
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/main/resources/static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
