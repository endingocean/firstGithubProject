<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新闻热点 - 每日人工智能资讯精选</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --text-muted: #555;
            --border: #2a2a3a;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .title-icon {
            -webkit-text-fill-color: initial;
            margin-right: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .nav-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .date-display {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .date-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
        }

        .date-picker {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .today-btn {
            background: linear-gradient(135deg, var(--accent), #00ff88);
            border: none;
            color: var(--bg-primary);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .today-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-card {
            display: flex;
            gap: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .news-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 40px rgba(0, 212, 255, 0.15);
        }

        .rank {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            background: var(--bg-secondary);
        }

        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
        }

        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #808080);
            color: #000;
        }

        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #8b4513);
        }

        .rank-4, .rank-5 {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .news-content {
            flex: 1;
            min-width: 0;
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .source-tag {
            background: var(--bg-secondary);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .heat-score {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            color: #ff6b35;
        }

        .heat-icon {
            font-size: 1.1rem;
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .news-summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .publish-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .read-more {
            color: var(--accent);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .news-card:hover .read-more {
            opacity: 1;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 16px;
            }

            .title {
                font-size: 1.8rem;
            }

            .news-card {
                flex-direction: column;
                gap: 16px;
            }

            .rank {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .news-title {
                font-size: 1.1rem;
            }

            .date-nav {
                gap: 8px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="title-icon">⚡</span>
                AI新闻热点
            </h1>
            <p class="subtitle">每日人工智能资讯精选</p>
        </header>

        <div class="date-nav">
            <button class="nav-btn" id="prevDay">←</button>
            <div class="date-display">
                <span class="date-text" id="dateText">今日热点</span>
                <input
                    type="date"
                    id="datePicker"
                    class="date-picker"
                />
            </div>
            <button class="nav-btn" id="nextDay">→</button>
            <button class="today-btn" id="goToToday">回到今日</button>
        </div>

        <div class="news-list" id="newsList"></div>

        <footer class="footer">
            <p>数据来源：各大科技媒体 | 热度指数基于多维度算法计算</p>
        </footer>
    </div>

    <script>
        // 示例新闻数据
        const newsData = {
            '2026-06-03': [
                {
                    id: 1,
                    title: 'OpenAI发布GPT-5：AGI领域重大突破',
                    source: 'TechCrunch',
                    url: 'https://techcrunch.com/ai/gpt5-release',
                    heatScore: 98.5,
                    publishTime: '2026-06-03 10:30:00',
                    summary: 'OpenAI今日正式发布GPT-5，在AGI领域取得重大突破。新模型展现出前所未有的推理能力和多模态理解能力，引发业界广泛关注。'
                },
                {
                    id: 2,
                    title: '谷歌DeepMind推出Gemini Ultra 2.0',
                    source: 'The Verge',
                    url: 'https://verge.com/ai/gemini-ultra-2',
                    heatScore: 95.2,
                    publishTime: '2026-06-03 09:15:00',
                    summary: '谷歌DeepMind团队今日宣布推出Gemini Ultra 2.0，该版本在代码生成和数学推理方面性能大幅提升，直接对标GPT-5。'
                },
                {
                    id: 3,
                    title: 'Anthropic融资30亿美元估值达600亿',
                    source: 'Bloomberg',
                    url: 'https://bloomberg.com/ai/anthropic-funding',
                    heatScore: 92.8,
                    publishTime: '2026-06-03 08:00:00',
                    summary: 'AI安全公司Anthropic完成新一轮30亿美元融资，公司估值达到600亿美元，成为仅次于OpenAI的第二大AI独角兽。'
                },
                {
                    id: 4,
                    title: 'Meta开源Llama 3.5：性能超越GPT-4',
                    source: 'Wired',
                    url: 'https://wired.com/ai/llama-3-5',
                    heatScore: 89.5,
                    publishTime: '2026-06-03 07:30:00',
                    summary: 'Meta正式开源Llama 3.5系列模型，在多项基准测试中超越GPT-4，且完全免费商用，引发开源社区热烈讨论。'
                },
                {
                    id: 5,
                    title: '英伟达发布下一代AI芯片Blackwell Ultra',
                    source: 'Ars Technica',
                    url: 'https://arstechnica.com/ai/nvidia-blackwell-ultra',
                    heatScore: 86.3,
                    publishTime: '2026-06-03 06:45:00',
                    summary: '英伟达在GTC大会上发布Blackwell Ultra芯片，AI训练性能提升3倍，能效比大幅优化，将于下半年正式出货。'
                }
            ],
            '2026-06-02': [
                {
                    id: 6,
                    title: '微软Copilot全面集成GPT-5',
                    source: 'Microsoft Blog',
                    url: 'https://microsoft.com/ai/copilot-gpt5',
                    heatScore: 94.0,
                    publishTime: '2026-06-02 10:30:00',
                    summary: '微软宣布Copilot全面集成GPT-5技术，Windows、Office全家桶将获得AI能力大幅提升。'
                },
                {
                    id: 7,
                    title: '特斯拉Optimus机器人实现量产',
                    source: 'Reuters',
                    url: 'https://reuters.com/ai/tesla-optimus',
                    heatScore: 91.5,
                    publishTime: '2026-06-02 14:00:00',
                    summary: '特斯拉宣布Optimus人形机器人正式量产，首批1000台将部署在工厂中，预计2027年面向消费者发售。'
                },
                {
                    id: 8,
                    title: '苹果Apple Intelligence推出2.0版本',
                    source: 'Apple Newsroom',
                    url: 'https://apple.com/newsroom/apple-intelligence',
                    heatScore: 88.0,
                    publishTime: '2026-06-02 09:00:00',
                    summary: '苹果发布Apple Intelligence 2.0，在Siri、照片、邮件等应用中加入更强大的AI功能。'
                },
                {
                    id: 9,
                    title: '百度文心一言4.0发布',
                    source: 'Baidu AI Cloud',
                    url: 'https://cloud.baidu.com/wenxin',
                    heatScore: 85.5,
                    publishTime: '2026-06-02 11:30:00',
                    summary: '百度发布文心一言4.0，在中文理解和生成方面达到新的高度，中文能力全面超越GPT-4。'
                },
                {
                    id: 10,
                    title: '阿里云通义千问开源Qwen3系列',
                    source: 'Alibaba Cloud',
                    url: 'https://aliyun.com/tongyi/qwen',
                    heatScore: 83.2,
                    publishTime: '2026-06-02 08:15:00',
                    summary: '阿里云开源通义千问Qwen3系列模型，包含8B、72B等多个版本，全面超越Llama 3。'
                }
            ]
        };

        let currentDate = new Date().toISOString().split('T')[0];
        const dateText = document.getElementById('dateText');
        const datePicker = document.getElementById('datePicker');
        const newsList = document.getElementById('newsList');
        const prevBtn = document.getElementById('prevDay');
        const nextBtn = document.getElementById('nextDay');
        const todayBtn = document.getElementById('goToToday');

        function formatDate(date) {
            const d = new Date(date);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const targetDate = new Date(date);
            targetDate.setHours(0, 0, 0, 0);

            if (targetDate.getTime() === today.getTime()) {
                return '今日热点';
            }
            return `${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function renderNews() {
            const news = newsData[currentDate] || [];

            dateText.textContent = formatDate(currentDate);
            datePicker.value = currentDate;
            datePicker.max = new Date().toISOString().split('T')[0];

            // 更新按钮状态
            const today = new Date().toISOString().split('T')[0];
            nextBtn.disabled = currentDate >= today;

            // 渲染新闻列表
            if (news.length === 0) {
                newsList.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                        <div style="font-size: 4rem; margin-bottom: 16px;">📰</div>
                        <p style="margin-bottom: 20px;">当日暂无新闻数据</p>
                    </div>
                `;
                return;
            }

            newsList.innerHTML = news.map((item, index) => `
                <a href="${item.url}" target="_blank" class="news-card" style="animation-delay: ${index * 0.1}s">
                    <div class="rank rank-${index + 1}">${index + 1}</div>
                    <div class="news-content">
                        <div class="news-header">
                            <span class="source-tag">${item.source}</span>
                            <span class="heat-score">
                                <span class="heat-icon">🔥</span>
                                ${item.heatScore}
                            </span>
                        </div>
                        <h2 class="news-title">${item.title}</h2>
                        <p class="news-summary">${item.summary}</p>
                        <div class="news-footer">
                            <span class="publish-time">${item.publishTime}</span>
                            <span class="read-more">阅读原文 →</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function goBack() {
            const date = new Date(currentDate);
            date.setDate(date.getDate() - 1);
            currentDate = date.toISOString().split('T')[0];
            renderNews();
        }

        function goForward() {
            const date = new Date(currentDate);
            date.setDate(date.getDate() + 1);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (date <= today) {
                currentDate = date.toISOString().split('T')[0];
                renderNews();
            }
        }

        function goToToday() {
            currentDate = new Date().toISOString().split('T')[0];
            renderNews();
        }

        // 事件监听
        prevBtn.addEventListener('click', goBack);
        nextBtn.addEventListener('click', goForward);
        todayBtn.addEventListener('click', goToToday);
        datePicker.addEventListener('change', (e) => {
            currentDate = e.target.value;
            renderNews();
        });

        // 初始渲染
        renderNews();
    </script>
</body>
</html>
